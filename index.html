    function deleteTransferLog(lotId, epoch) {
        let records = JSON.parse(localStorage.getItem('fabricRecords')) || [];
        const lotIndex = records.findIndex(r => r.id === lotId);
        if (lotIndex === -1) return;
        const record = records[lotIndex];
        if (!checkLifo(record, epoch)) return;
        
        if (confirm("Are you sure you want to delete this issue/transfer entry?")) {
            const logToDelete = record.transferLogs.find(l => l.epoch === epoch);
            if (logToDelete && String(logToDelete.cutter).startsWith("MERGED INTO GODOWN LOT ")) {
                const targetLotNo = String(logToDelete.cutter).replace("MERGED INTO GODOWN LOT ", "").trim();
                const mergedLot = records.find(r => r.lotNumber === targetLotNo && r.batchNumber === "GODOWN-MIX");
                if (mergedLot) {
                    let mergedMax = 0;
                    if (mergedLot.transferLogs) mergedLot.transferLogs.forEach(l => { if(l.epoch > mergedMax) mergedMax = l.epoch; });
                    if (mergedLot.cuttingLogs) mergedLot.cuttingLogs.forEach(l => { if(l.epoch > mergedMax) mergedMax = l.epoch; });
                    if (mergedLot.returnLogs) mergedLot.returnLogs.forEach(l => { if(l.epoch > mergedMax) mergedMax = l.epoch; });
                    const initialLog = mergedLot.outsideMaterialLogs ? mergedLot.outsideMaterialLogs[0] : null;
                    if (mergedMax > (initialLog ? (initialLog.epoch || 0) : 0)) {
                        alert("❌ ডিলিট করা সম্ভব নয়! এই মার্জ করা লটটি (" + targetLotNo + ") ইতিমধ্যে ব্যবহার করা হয়েছে। প্রথমে ওই লটের অ্যাক্টিভিটি ডিলিট করুন।");
                        return;
                    }
                    records = records.filter(r => r.id !== mergedLot.id);
                }
                records.forEach(r => {
                    if (r.transferLogs) {
                        r.transferLogs = r.transferLogs.filter(l => l.cutter !== `MERGED INTO GODOWN LOT ${targetLotNo}`);
                        recalculateRecord(r);
                    }
                });
            } else if (logToDelete && String(logToDelete.cutter).startsWith("LENT TO LAYER CUT ")) {
                const targetLotNo = String(logToDelete.cutter).replace("LENT TO LAYER CUT ", "").trim();
                const mergedLot = records.find(r => r.lotNumber === targetLotNo && r.batchNumber === "LAY-MIX");
                if (mergedLot) {
                    let mergedMax = 0;
                    if (mergedLot.transferLogs) mergedLot.transferLogs.forEach(l => { if(l.epoch > mergedMax) mergedMax = l.epoch; });
                    if (mergedLot.cuttingLogs) mergedLot.cuttingLogs.forEach(l => { if(l.epoch > mergedMax) mergedMax = l.epoch; });
                    if (mergedLot.returnLogs) mergedLot.returnLogs.forEach(l => { if(l.epoch > mergedMax) mergedMax = l.epoch; });
                    const initialLog = mergedLot.outsideMaterialLogs ? mergedLot.outsideMaterialLogs[0] : null;
                    if (mergedMax > (initialLog ? (initialLog.epoch || 0) : 0)) {
                        alert("❌ ডিলিট করা সম্ভব নয়! এই মার্জ করা লেয়ার লটটি (" + targetLotNo + ") ইতিমধ্যে ব্যবহার করা হয়েছে।");
                        return;
                    }
                    records = records.filter(r => r.id !== mergedLot.id);
                }
                records.forEach(r => {
                    if (r.transferLogs) {
                        r.transferLogs = r.transferLogs.filter(l => l.cutter !== `LENT TO LAYER CUT ${targetLotNo}`);
                        recalculateRecord(r);
                    }
                });
            } else if (logToDelete && String(logToDelete.cutter).startsWith("LENT TO LOT ")) {
                const targetLotNo = String(logToDelete.cutter).replace("LENT TO LOT ", "").trim();
                const targetLot = records.find(r => r.lotNumber === targetLotNo);
                if (targetLot) {
                    let targetMax = 0;
                    if (targetLot.transferLogs) targetLot.transferLogs.forEach(l => { if(targetMax < l.epoch) targetMax = l.epoch; });
                    if (targetLot.cuttingLogs) targetLot.cuttingLogs.forEach(l => { if(targetMax < l.epoch) targetMax = l.epoch; });
                    if (targetLot.returnLogs) targetLot.returnLogs.forEach(l => { if(targetMax < l.epoch) targetMax = l.epoch; });
                    if (targetLot.outsideMaterialLogs) targetLot.outsideMaterialLogs.forEach(l => { if(targetMax < l.epoch) targetMax = l.epoch; });
                    
                    let maxBorrowEpochInTarget = 0;
                    if (targetLot.outsideMaterialLogs) {
                        targetLot.outsideMaterialLogs.forEach(l => {
                            if (l.sourceLot === record.lotNumber && Math.abs(l.epoch - logToDelete.epoch) <= 10) {
                                if (l.epoch > maxBorrowEpochInTarget) maxBorrowEpochInTarget = l.epoch;
                            }
                        });
                    }
                    
                    if (maxBorrowEpochInTarget > 0 && targetMax > maxBorrowEpochInTarget) {
                        alert("❌ ডিলিট করা সম্ভব নয়! এই ধার দেওয়া লটটি (" + targetLotNo + ") ইতিমধ্যে কাটিং বা অন্য কাজে ব্যবহার করা হয়েছে (LIFO Rule)। প্রথমে ওই লটের লেটেস্ট অ্যাক্টিভিটি ডিলিট করুন।");
                        return;
                    }
                    
                    record.transferLogs = record.transferLogs.filter(l => !(Math.abs(l.epoch - logToDelete.epoch) <= 10 && (l.targetLot === targetLotNo || String(l.cutter) === String(logToDelete.cutter) || String(l.targetLot) === targetLotNo)));
                    targetLot.outsideMaterialLogs = targetLot.outsideMaterialLogs.filter(l => !(l.sourceLot === record.lotNumber && Math.abs(l.epoch - logToDelete.epoch) <= 10));
                    recalculateRecord(targetLot);
                    recalculateRecord(record);
                } else {
                    record.transferLogs = record.transferLogs.filter(l => !(Math.abs(l.epoch - logToDelete.epoch) <= 10 && (l.targetLot === targetLotNo || String(l.cutter) === String(logToDelete.cutter))));
                    recalculateRecord(record);
                }
            } else {
                record.transferLogs = record.transferLogs.filter(l => l.epoch !== epoch);
                recalculateRecord(record);
            }
            localStorage.setItem('fabricRecords', JSON.stringify(records));
            loadRecords();
        }
    }

    function deleteOutsideLog(lotId, epoch) {
        let records = JSON.parse(localStorage.getItem('fabricRecords')) || [];
        const lotIndex = records.findIndex(r => r.id === lotId);
        if (lotIndex === -1) return;
        const record = records[lotIndex];
        if (!checkLifo(record, epoch)) return;
        
        if (confirm("Are you sure you want to delete this creation/borrow entry?")) {
            const logToDelete = record.outsideMaterialLogs.find(l => l.epoch === epoch);
            if (logToDelete && (record.batchNumber === "GODOWN-MIX" || record.batchNumber === "LAY-MIX")) {
                const targetLotNo = record.lotNumber;
                records.forEach(r => {
                    if (r.transferLogs) {
                        r.transferLogs = r.transferLogs.filter(l => l.cutter !== `MERGED INTO GODOWN LOT ${targetLotNo}` && l.cutter !== `LENT TO LAYER CUT ${targetLotNo}`);
                        recalculateRecord(r);
                    }
                });
                records = records.filter(r => r.id !== lotId);
            } else if (logToDelete) {
                const sourceLotNo = logToDelete.sourceLot;
                const sourceLot = records.find(r => r.lotNumber === sourceLotNo);
                if (sourceLot) {
                    sourceLot.transferLogs = sourceLot.transferLogs.filter(l => !(Math.abs(l.epoch - logToDelete.epoch) <= 10 && (l.targetLot === record.lotNumber || String(l.cutter) === `LENT TO LOT ${record.lotNumber}`)));
                    recalculateRecord(sourceLot);
                }
                record.outsideMaterialLogs = record.outsideMaterialLogs.filter(l => !(l.sourceLot === sourceLotNo && Math.abs(l.epoch - logToDelete.epoch) <= 10));
                recalculateRecord(record);
            }
            localStorage.setItem('fabricRecords', JSON.stringify(records));
            loadRecords();
        }
    }

    function loadRecords() {
        const records = JSON.parse(localStorage.getItem('fabricRecords')) || [];
        const cutterList = document.getElementById('cutterRecordsList');
        if(!cutterList) return; cutterList.innerHTML = '';

        const activeCutter = document.getElementById('cutterSelect').value;
        let activeCutterLotCount = 0;
        populateLayerSourceLotDropdown(records, activeCutter);

        records.forEach(record => {
            recalculateRecord(record);
            let cutterBalances = getCutterStocks(record);
            let currentCutterData = cutterBalances[activeCutter];

            if (currentCutterData && currentCutterData.hasActivity) {
                const labelExtra = record.isPolo ? 'collar' : 'rib';
                let hasStockRemaining = false;
                let cBodyBal = Math.max(0, currentCutterData.body), cExtraBal = Math.max(0, currentCutterData[labelExtra]), cGenBal = Math.max(0, currentCutterData.general);

                if (currentCutterData.body > 0.009 || currentCutterData[labelExtra] > 0.009) hasStockRemaining = true;
                if (!record.isPolo && !record.isGrs && currentCutterData.general > 0.009) hasStockRemaining = true;

                if (hasStockRemaining) {
                    activeCutterLotCount++;
                    let cutterCardStockHTML = '', cutterCardActionHTML = '';
                    const labelExtraBn = record.isPolo ? 'Collar' : 'Rib', sourceLotOptionsHTML = transformLotOptionsHTML(records, record.id, activeCutter);
                    let uStr = record.isTextile ? "Mtr" : "Kg"; let uAbbr = record.isTextile ? "M" : "k";

                    if (record.isPolo || record.isGrs) {
                        cutterCardStockHTML = `<div class="stock-display-grid" style="background:#fffcf4; border-color:#ffe2b3;" onclick="event.stopPropagation();"><b>👤 Balance:</b> Body: ${cBodyBal.toFixed(3)}${uAbbr} \| ${labelExtraBn}: ${cExtraBal.toFixed(3)}${uAbbr}</div>`;
                        cutterCardActionHTML = `
                            <div class="card-action-panel">
                                <div class="panel-title" style="color:#e67e22;">✂️ Cutting Production</div>
                                <div class="action-row-split">
                                    <input type="number" id="input_pagecut_body_${record.id}" step="0.01" placeholder="Body">
                                    <input type="number" id="input_pagecut_extra_${record.id}" step="0.01" placeholder="${labelExtraBn}">
                                    <input type="text" id="input_pagecut_ch_${record.id}" placeholder="Challan No">
                                    <button class="cut-btn" onclick="executeCutterPageCut(${record.id}, true, '${activeCutter}')">Add Cut</button>
                                </div>
                                <div class="panel-title" style="color:#9b59b6; margin-top:5px; border-top:1px solid #cbd5e1; padding-top:3px;">📦 Borrow Fabric From Another Lot</div>
                                <div class="action-row-split">
                                    <select id="source_lot_select_${record.id}">${sourceLotOptionsHTML}</select>
                                    <input type="number" id="input_outside_body_${record.id}" step="0.01" placeholder="Borrow Body">
                                    <input type="number" id="input_outside_extra_${record.id}" step="0.01" placeholder="Borrow ${labelExtraBn}">
                                    <button class="add-material-btn" onclick="executeAddOutsideMaterial(${record.id}, true, '${activeCutter}')">Add ➕</button>
                                </div>
                            </div>`;
                    } else {
                        cutterCardStockHTML = `<div class="stock-display-grid" style="background:#fffcf4; border-color:#ffe2b3;" onclick="event.stopPropagation();"><b>👤 Balance:</b> ${cGenBal.toFixed(3)} ${uStr}</div>`;
                        cutterCardActionHTML = `
                            <div class="card-action-panel">
                                <div class="panel-title" style="color:#e67e22;">✂️ Cutting Production</div>
                                <div class="action-row-split">
                                    <input type="number" id="input_pagecut_gen_${record.id}" step="0.01" placeholder="Qty (${uStr})">
                                    <input type="text" id="input_pagecut_ch_${record.id}" placeholder="Challan No">
                                    <button class="cut-btn" onclick="executeCutterPageCut(${record.id}, false, '${activeCutter}')">Add Cut</button>
                                </div>
                                <div class="panel-title" style="color:#9b59b6; margin-top:5px; border-top:1px solid #cbd5e1; padding-top:3px;">📦 Borrow Fabric From Another Lot</div>
                                <div class="action-row-split">
                                    <select id="source_lot_select_${record.id}">${sourceLotOptionsHTML}</select>
                                    <input type="number" id="input_outside_gen_${record.id}" step="0.01" placeholder="Borrow Qty">
                                    <button class="add-material-btn" onclick="executeAddOutsideMaterial(${record.id}, false, '${activeCutter}')">Add ➕</button>
                                </div>
                            </div>`;
                    }

                    let timelineEntries = [];
                    if(record.transferLogs) {
                        record.transferLogs.forEach((log, lIdx) => {
                            if (log.cutter === activeCutter) {
                                let html = log.weight < 0 ? `<div style="padding: 2px 0; color:#c0392b; font-weight: bold; display:flex; justify-content:space-between; align-items:center;"><span>📉 Lent ${Math.abs(log.weight).toFixed(3)}${uAbbr} [${log.part}] to ${log.targetLot || 'N/A'}</span><button class="mini-edit-btn" style="background-color:#e74c3c; margin-left:5px;" onclick="deleteTransferLog(${record.id}, ${log.epoch || 0})">Delete</button></div>` : `<div style="padding: 2px 0; color:#2980b9; display:flex; justify-content:space-between; align-items:center;"><span>➡️ Received ${log.weight.toFixed(3)}${uAbbr} [${log.part}] (${log.time})</span><button class="mini-edit-btn" style="background-color:#e74c3c; margin-left:5px;" onclick="deleteTransferLog(${record.id}, ${log.epoch || 0})">Delete</button></div>`;
                                timelineEntries.push({ time: log.epoch || 0, cycle: lIdx, html: html });
                            }
                        });
                    }
                    if (record.outsideMaterialLogs) {
                        record.outsideMaterialLogs.forEach((log, lIdx) => {
                            if (log.cutter === activeCutter) {
                                timelineEntries.push({ time: log.epoch || 0, cycle: lIdx, html: `<div style="padding: 2px 0; color:#9b59b6; font-weight:bold; display:flex; justify-content:space-between; align-items:center;"><span>➕ Borrowed ${log.weight.toFixed(3)}${uAbbr} [${log.part}] from ${log.sourceLot}</span><button class="mini-edit-btn" style="background-color:#e74c3c; margin-left:5px;" onclick="deleteOutsideLog(${record.id}, ${log.epoch || 0})">Delete</button></div>` });
                            }
                        });
                    }
                    if(record.cuttingLogs) {
                        record.cuttingLogs.forEach((log, lIdx) => {
                            if (log.cutter === activeCutter) {
                                let txt = record.isPolo ? `Body: ${log.bodyWeight}${uAbbr}, Collar: ${log.collarWeight}${uAbbr}` : (record.isGrs ? `Body: ${log.bodyWeight}${uAbbr}, Rib: ${log.ribWeight}${uAbbr}` : `${log.weight} ${uStr}`);
                                let chText = log.challanNo && log.challanNo !== "N/A" ? ` [Ch: ${log.challanNo}]` : '';
                                timelineEntries.push({ time: log.epoch || log.logId || 0, cycle: lIdx, html: `<div style="padding: 2px 0; color:#e67e22; display:flex; justify-content:space-between;"><span>✂️ Cut Entry: ${txt}${chText}</span> <div style="display:flex; gap:3px;"><button class="mini-edit-btn" onclick="editCuttingLog(${record.id}, ${log.logId})">Edit</button><button class="mini-edit-btn" style="background-color:#e74c3c;" onclick="deleteCuttingLog(${record.id}, ${log.logId})">Delete</button></div></div>` });
                            }
                        });
                    }
                    if (record.returnLogs) {
                        record.returnLogs.forEach((log, lIdx) => {
                            if (log.cutter === activeCutter) {
                                let chText = log.challanNo && log.challanNo !== "N/A" ? ` [Ch: ${log.challanNo}]` : '';
                                timelineEntries.push({ time: log.epoch || 0, cycle: lIdx, html: `<div style="padding: 2px 0; color:#2ecc71; display:flex; justify-content:space-between;"><span>⬅️ Returned ${log.weight.toFixed(3)}${uAbbr} [${log.part}] (${log.time})${chText}</span> <div style="display:flex; gap:3px;"><button class="mini-edit-btn" onclick="editReturnLog(${record.id}, ${log.epoch || 0})">Edit</button><button class="mini-edit-btn" style="background-color:#e74c3c;" onclick="deleteReturnLog(${record.id}, ${log.epoch || 0})">Delete</button></div></div>` });
                            }
                        });
                    }

                    timelineEntries.sort((a, b) => { if (a.time !== b.time) return a.time - b.time; return a.cycle - b.cycle; });
                    let cutterLogsHTML = '<div class="cutting-history"><strong>📜 Activity Logs (Chronological Order):</strong><br>' + timelineEntries.map(e => e.html).join('') + '</div>';

                    const cutCard = document.createElement('div'); cutCard.className = 'record-card';
                    cutCard.innerHTML = `
                        <div onclick="let d = this.nextElementSibling; d.style.display = d.style.display === 'none' ? 'block' : 'none'; this.querySelector('.toggle-indicator').innerText = d.style.display === 'none' ? '▼ Click to Open' : '▲ Click to Close';" style="cursor:pointer; position:relative; padding-right:110px;">
                            <p><strong>Lot No:</strong> <span style="color:#e67e22;font-weight:bold;">${record.lotNumber || 'N/A'}</span> \| <strong>Quality:</strong> ${record.fabricName} \| <strong>Color:</strong> <span style="color:#3498db;font-weight:bold;">${record.fabricColor || 'NO COLOR'}</span> (GSM: ${record.gsm || 'N/A'})</p>
                            ${cutterCardStockHTML}
                            <div class="toggle-indicator" style="position:absolute; right:5px; top:50%; transform:translateY(-50%); font-size:11px; font-weight:bold; color:#e67e22; background:#fffcf4; padding:4px 8px; border-radius:4px; border:1px solid #ffe2b3;">▼ Click to Open</div>
                        </div>
                        <div class="card-expanded-details" style="display:none; border-top:1px dashed #cbd5e1; margin-top:10px; padding-top:5px;">
                            ${cutterCardActionHTML} ${cutterLogsHTML}
                        </div>`;
                    cutterList.appendChild(cutCard);
                }
            }
        });
        if (activeCutterLotCount === 0 && activeCutter) { cutterList.innerHTML = `<p style="text-align:center; color:#94a3b8; padding:30px;">📂 No records found for ${activeCutter}.</p>`; }
    }

    function editCuttingLog(lotId, logId) {
        let records = JSON.parse(localStorage.getItem('fabricRecords')) || [];
        const lotIndex = records.findIndex(r => r.id === lotId);
        if (lotIndex === -1) return; const currentRecord = records[lotIndex];
        const logIndex = currentRecord.cuttingLogs.findIndex(l => l.logId === logId);
        if (logIndex === -1) return; const currentLog = currentRecord.cuttingLogs[logIndex];

        const selectedCutter = document.getElementById('cutterSelect').value;
        let proposedW = currentLog.bodyWeight + currentLog.collarWeight + currentLog.ribWeight;

        if (currentRecord.isPolo || currentRecord.isGrs) {
            const newB = parseFloat(prompt("Edit Body Weight:", currentLog.bodyWeight)) || 0;
            const newE = parseFloat(prompt("Edit Extra Weight:", currentRecord.isPolo ? currentLog.collarWeight : currentLog.ribWeight)) || 0;
            proposedW = newB + newE;
            
            currentLog.bodyWeight = newB; if (currentRecord.isPolo) currentLog.collarWeight = newE; else currentLog.ribWeight = newE; currentLog.weight = proposedW;
        } else {
            const newW = parseFloat(prompt("Edit Cutting Weight:", currentLog.weight));
            if (!isNaN(newW)) {
                currentLog.weight = newW;
            }
        }
        const newCh = prompt("Edit Cutting Challan No:", currentLog.challanNo || "");
        if (newCh !== null) { currentLog.challanNo = newCh.trim() === "" ? "N/A" : newCh.trim().toUpperCase(); }
        localStorage.setItem('fabricRecords', JSON.stringify(records)); loadRecords();
    }

    window.addEventListener('storage', function(e) { if (e.key === 'fabricRecords' || e.key === 'cutterList') { loadRecords(); } });
</script>

    </textarea>

    <script>
        const FILE_NAME = 'garments_tracker_data.json';
        let dirHandle = null;

        async function openApp(appType) {
            if (!dirHandle) {
                alert("Please select your data folder to sync your data file (" + FILE_NAME + ").");
                try {
                    dirHandle = await window.showDirectoryPicker();
                    let fileHandle;
                    let exists = true;
                    try {
                        fileHandle = await dirHandle.getFileHandle(FILE_NAME, { create: false });
                    } catch (e) {
                        exists = false;
                    }

                    if (exists) {
                        const file = await fileHandle.getFile();
                        const text = await file.text();
                        if (text.trim()) {
                            const data = JSON.parse(text);
                            if (data.records) localStorage.setItem('fabricRecords', JSON.stringify(data.records));
                            if (data.fabricList) localStorage.setItem('fabricList', JSON.stringify(data.fabricList));
                            if (data.cutterList) localStorage.setItem('cutterList', JSON.stringify(data.cutterList));
                        }
                    } else {
                        const fileHandleNew = await dirHandle.getFileHandle(FILE_NAME, { create: true });
                        const writable = await fileHandleNew.createWritable();
                        const data = {
                            records: JSON.parse(localStorage.getItem('fabricRecords') || '[]'),
                            fabricList: JSON.parse(localStorage.getItem('fabricList') || '[]'),
                            cutterList: JSON.parse(localStorage.getItem('cutterList') || '[]')
                        };
                        await writable.write(JSON.stringify(data, null, 2));
                        await writable.close();
                    }
                    
                    setInterval(async () => {
                        if (!dirHandle) return;
                        try {
                            const fh = await dirHandle.getFileHandle(FILE_NAME, { create: true });
                            const w = await fh.createWritable();
                            const d = {
                                records: JSON.parse(localStorage.getItem('fabricRecords') || '[]'),
                                fabricList: JSON.parse(localStorage.getItem('fabricList') || '[]'),
                                cutterList: JSON.parse(localStorage.getItem('cutterList') || '[]')
                            };
                            await w.write(JSON.stringify(d, null, 2));
                            await w.close();
                        } catch (err) {}
                    }, 2000);

                } catch (err) {
                    alert("Folder access is required to run the dashboard securely with auto-save.");
                    return;
                }
            }

            document.getElementById('homepage').style.display = 'none';
            document.getElementById('app_container').style.display = 'flex';
            
            const titleEl = document.getElementById('current_app_title');
            const iframe = document.getElementById('app_iframe');
            let sourceCode = '';

            if (appType === 'godown') {
                titleEl.innerText = '📦 Godown Inventory System';
                sourceCode = document.getElementById('godown_source').value;
            } else if (appType === 'cutter') {
                titleEl.innerText = '✂️ Cutter Room Tracking';
                sourceCode = document.getElementById('cutter_source').value;
            }

            const blob = new Blob([sourceCode], { type: 'text/html' });
            iframe.src = URL.createObjectURL(blob);
        }

        function goHome() {
            document.getElementById('app_container').style.display = 'none';
            document.getElementById('homepage').style.display = 'flex';
            document.getElementById('app_iframe').src = 'about:blank';
        }
    </script>
